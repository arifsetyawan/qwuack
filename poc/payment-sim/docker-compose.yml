name: qwuack-payment-sim

# POC-only credentials and off-default host ports to avoid clashing with local services.
services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: pocroot
      MYSQL_DATABASE: ledger_final
      MYSQL_USER: poc
      MYSQL_PASSWORD: pocpass
    ports:
      - "33061:3306"
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-ppocroot"]
      interval: 2s
      timeout: 5s
      retries: 60

  redis:
    image: redis:7-alpine
    ports:
      - "63791:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "56721:5672"
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 30
