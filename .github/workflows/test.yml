name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install
          # payment-sim is a self-contained sub-project; its test files are
          # discovered by the root `bun test` and need their imports resolvable
          # (the suites themselves skip unless POC_PAYMENT_SIM/POC_LOAD_TEST is set).
          bun install --cwd poc/payment-sim

      - name: Run tests with coverage
        id: coverage
        env:
          REDIS_URL: redis://localhost:6379
        run: |
          # tee (not command substitution) so test output reaches the log even
          # when bun test fails; pipefail preserves its exit code through tee.
          set -o pipefail
          bun test --coverage 2>&1 | tee test-output.log

          # Extract line coverage percentage
          COVERAGE=$(grep -E "^\s*All files" test-output.log | awk '{print $4}' | tr -d '%')
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

          # Determine badge color based on coverage
          if (( $(echo "$COVERAGE >= 80" | bc -l) )); then
            echo "color=brightgreen" >> $GITHUB_OUTPUT
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
            echo "color=yellow" >> $GITHUB_OUTPUT
          else
            echo "color=red" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: bun run build

      - name: Create coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ secrets.GIST_ID }}
          filename: qwuack-coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.coverage }}%
          color: ${{ steps.coverage.outputs.color }}
